# ═════════════════════════════════════════════════════════════════════════════
# Atithi Setu — Deploy notifier (PULL model)
# ═════════════════════════════════════════════════════════════════════════════
# History: this workflow used to SSH into the VPS and run the deploy script
# directly. That worked but became fragile because Hostinger's panel-level
# firewall intermittently blocks inbound TCP from GitHub Actions runner
# IPs. Every block = a failed deploy = master and prod drift.
#
# v3 (current): the VPS pulls FROM GitHub via a cron-driven script
# (deploy/poll-and-deploy.sh). Outbound HTTPS from VPS to GitHub is never
# blocked. This workflow is now a thin notifier — it just records the
# release event and (optionally) waits to verify the marker came up live.
#
# Trade-off: deploys lag up to 60s behind a push (instead of starting
# immediately). In practice that's invisible — npm install + docker
# build is 2-3 min regardless.
#
# No secrets required. No SSH access. Workflow runs even if Hostinger
# is hard-blocking GitHub IPs.
#
# To return to push-mode in an emergency: revert this file to the pre-v3
# commit (~Jun 5 2026) and disable the cron via `sudo crontab -e` on the VPS.
# ═════════════════════════════════════════════════════════════════════════════

name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  notify:
    name: Record release + verify pull-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Tag the release event
        run: |
          echo "════════════════════════════════════════════"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Author:  ${{ github.actor }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Message: ${{ github.event.head_commit.message }}"
          echo "════════════════════════════════════════════"
          echo "The VPS polls origin/master every minute and will"
          echo "auto-deploy this commit. Verification follows below."

      # ───────────────────────────────────────────────────────────────────
      # Wait for the VPS cron to pick up the commit (≤ 60s) and complete
      # the docker build + container swap (~2-3 min). We poll the public
      # /api/version endpoint until either it returns the expected
      # commit_marker OR we hit a 10-min ceiling.
      # ───────────────────────────────────────────────────────────────────
      - name: Wait for VPS pull-deploy to publish
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          VERIFY_URL: "https://app.atithi-setu.com/api/version"
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          echo "→ Polling ${VERIFY_URL} for commit ${EXPECTED_SHA:0:7}…"

          # 60 attempts × 10s = 10 minutes worst case
          for i in $(seq 1 60); do
            body=$(curl -s --max-time 5 "${VERIFY_URL}" 2>/dev/null || true)
            if [ -z "${body}" ]; then
              echo "  attempt ${i}/60: no response (curl error or 5xx) — retrying in 10s"
              sleep 10
              continue
            fi

            # The /api/version response includes booted_at (ISO timestamp).
            # We use it as the freshness signal — a deploy that's actually
            # picked up this commit will have rebooted within the last ~5 min.
            booted_at=$(echo "${body}" | grep -oE '"booted_at":"[^"]+"' | cut -d'"' -f4 || echo "")
            marker=$(echo "${body}" | grep -oE '"commit_marker":"[^"]+"' | cut -d'"' -f4 || echo "?")

            if [ -n "${booted_at}" ]; then
              # Convert to epoch — date(1) is GNU on the runner.
              boot_epoch=$(date -d "${booted_at}" +%s 2>/dev/null || echo 0)
              now_epoch=$(date +%s)
              age=$((now_epoch - boot_epoch))
              if [ ${age} -lt 300 ]; then
                echo "✅ VPS rebooted ${age}s ago — commit_marker=${marker} — deploy is live."
                exit 0
              fi
              echo "  attempt ${i}/60: live marker=${marker} but booted ${age}s ago (waiting for fresh boot)…"
            else
              echo "  attempt ${i}/60: marker=${marker} (no booted_at field) — retrying in 10s"
            fi
            sleep 10
          done

          # Don't fail the workflow — the cron-deploy may still succeed
          # after this 10-min window (e.g. slow npm install). Operators
          # can verify manually via curl. This is monitoring, not gating.
          echo "::warning::Verification timed out after 10 minutes. The VPS cron may still complete the deploy."
          echo "::warning::Check live status: curl ${VERIFY_URL} | grep commit_marker"
          echo "::warning::If marker still doesn't match after 15 minutes, SSH to the VPS:"
          echo "::warning::  tail -100 /opt/atithi-setu/poll-deploy.log"
          echo "::warning::  tail -100 /opt/atithi-setu/deploy-history.log"
