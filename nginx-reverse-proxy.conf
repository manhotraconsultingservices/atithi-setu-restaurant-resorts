server {
    listen 80;
    server_name demo-erp.atithi-setu.com;

    # Redirect HTTP to HTTPS (optional, remove if not using SSL)
    # return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;  # Remove if not using SSL initially
    server_name demo-erp.atithi-setu.com;

    # SSL Certificate Configuration (uncomment when you have certificates)
    # ssl_certificate /etc/nginx/certs/demo-erp.atithi-setu.com.crt;
    # ssl_certificate_key /etc/nginx/certs/demo-erp.atithi-setu.com.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;

    # Main application proxy
    location / {
        proxy_pass http://localhost:5001;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API routes
    location /api/ {
        proxy_pass http://localhost:5001;
    }

    # GitHub deploy webhook → host-side listener on port 5002
    # The listener (deploy-webhook-listener.mjs) validates HMAC and spawns deploy-pipeline.ps1
    location = /webhook/github {
        proxy_pass http://127.0.0.1:5002/webhook/github;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # All other webhook routes → app container
    location /webhook/ {
        proxy_pass http://localhost:5001;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:5001;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
